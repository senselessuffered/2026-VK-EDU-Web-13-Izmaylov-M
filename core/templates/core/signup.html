{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AskPupkin · Sign Up</title>
    <link rel="icon" type="image/svg" href="{% static 'img/favicon.svg' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">

<header class="bg-black border-bottom py-3">
    <div class="container d-flex align-items-center flex-wrap gap-2">
        <a href="index.html" class="text-decoration-none text-white fs-4 fw-bold">
            AskPupkin
        </a>

        <form class="d-flex flex-grow-1 header-search-form">
            <input type="text" class="form-control me-2" placeholder="Найти вопросы...">
            <button class="btn btn-outline-light">Поиск</button>
        </form>

        <div class="d-flex align-items-center ms-auto gap-2 flex-wrap">
            <a href="ask.html" class="btn btn-gradient">
                Спросить
            </a>
            <a href="login.html" class="btn btn-outline-light">
                Войти
            </a>
            <a href="signup.html" class="btn btn-success">
                Зарегистрироваться
            </a>
        </div>
    </div>
</header>

<main class="container my-4 flex-grow-1">
    <div class="row justify-content-center">

        <div class="col-12 col-lg-7">

            <div class="card-dark">
                <div class="card-body p-4">

                    <h1 class="h3 mb-3 text-white">Создать аккаунт</h1>

                    <form>
                        <div class="mb-3">
                            <label class="form-label text-white-50">Имя пользователя</label>
                            <input type="text" class="form-input-dark" required placeholder="Username">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">Почта</label>
                            <input type="email" class="form-input-dark" required placeholder="you@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-white-50">Пароль</label>
                            <input type="password" class="form-input-dark" required placeholder="••••••••">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Зарегистрироваться</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="login.html" class="text-white-50 text-decoration-none">
                            Уже есть аккаунт?
                        </a>
                    </div>

                </div>
            </div>

        </div>

        <div class="col-12 col-lg-4 mt-4 mt-lg-0">

            <div class="card-dark mb-4">
                <div class="card-header-dark">
                    <h5 class="mb-0 text-white">Популярные теги</h5>
                </div>
                <div class="card-body">
                    <div class="tags-container">
                        <a href="#" class="badge text-bg-primary">python</a>
                        <a href="#" class="badge text-bg-success">django</a>
                        <a href="#" class="badge text-bg-warning text-dark">javascript</a>
                        <a href="#" class="badge text-bg-danger">html</a>
                        <a href="#" class="badge text-bg-info text-dark">css</a>
                    </div>
                </div>
            </div>

            <div class="card-dark">
                <div class="card-header-dark">
                    <h5 class="text-white mb-0">Лучшие участники</h5>
                </div>
                <div class="card-body">

                    <div class="d-flex align-items-center mb-3">
                        <img src="{% static 'img/avatar-default.jpg' %}" class="rounded-circle me-3" width="40" height="40" alt="">
                        <div>
                            <div class="fw-semibold text-white">Mr. Freeman</div>
                            <small class="text-white-50">1245 points</small>
                        </div>
                    </div>

                    <div class="d-flex align-items-center mb-3">
                        <img src="{% static 'img/avatar-default.jpg' %}" class="rounded-circle me-3" width="40" height="40" alt="">
                        <div>
                            <div class="fw-semibold text-white">Dr. House</div>
                            <small class="text-white-50">987 points</small>
                        </div>
                    </div>

                    <div class="d-flex align-items-center">
                        <img src="{% static 'img/avatar-default.jpg' %}" class="rounded-circle me-3" width="40" height="40" alt="">
                        <div>
                            <div class="fw-semibold text-white">Bender</div>
                            <small class="text-white-50">756 points</small>
                        </div>
                    </div>

                </div>
            </div>

        </div>

    </div>
</main>

<footer class="bg-black border-top py-3 mt-auto">
    <div class="container text-center">
        <small class="text-white-50">REL© 2026</small>
    </div>
</footer>

<script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
