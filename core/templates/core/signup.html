{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">

<div class="row justify-content-center">
    <div class="col-12 col-lg-7">
        <div class="card bg-dark shadow-sm border-secondary">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-white">
                    Создать аккаунт
                </h1> 
                
                <form>
                    <div class="mb-3"> 
                        <label class="form-label text-white-50">Имя пользователя</label> 
                        <input type="text"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="Username"
                               required minlength="3" maxlength="20">
                    </div> 
                    <div class="mb-3"> 
                        <label class="form-label text-white-50">Почта</label>
                        <input type="email"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="you@example.com"
                               required minlength="5" maxlength="40">
                    </div> 
                    <div class="mb-3">
                        <label class="form-label text-white-50">Пароль</label> 
                        <input type="password"
                               class="form-control bg-dark text-white border-secondary"
                               placeholder="••••••••"
                               required minlength="5" maxlength="100">
                    </div>
                    <div class="d-grid">     
                        <button type="submit" class="btn btn-success">Зарегистрироваться</button>
                    </div>
        
                </form> 
            <div class="text-center mt-3">
                <a href="{% url 'core:login' %}" class="text-white-50 text-decoration-none"> Уже есть аккаунт? </a>
            </div> 
        </div> 
    </div> 
</div>
{% endblock %}
