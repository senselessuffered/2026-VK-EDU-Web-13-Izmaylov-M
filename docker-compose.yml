x-app-env: &app-env
  SECRET_KEY: django-insecure-docker-dev-key
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,web"
  DB_ENGINE: django.db.backends.postgresql
  DB_HOST: db
  DB_NAME: askme
  DB_USER: askme
  DB_PASSWORD: askme
  DB_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_CACHE_DB: "1"
  REDIS_BROKER_DB: "2"
  REDIS_BEAT_DB: "3"
  POPULAR_TAGS_REFRESH_SECONDS: "600"
  BEST_MEMBERS_REFRESH_SECONDS: "600"
  SIDEBAR_CACHE_TIMEOUT: "1800"
  EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
  EMAIL_HOST: maildev
  EMAIL_PORT: "1025"
  EMAIL_USE_TLS: "False"
  DEFAULT_FROM_EMAIL: AskPupkin <noreply@askpupkin.local>
  CENTRIFUGO_API_URL: http://centrifugo:8000
  CENTRIFUGO_API_KEY: askpupkin-api-key
  CENTRIFUGO_TOKEN_SECRET: askpupkin-token-secret
  CENTRIFUGO_NAMESPACE: questions
  CENTRIFUGO_WS_URL: ws://localhost:8001/connection/websocket
  CENTRIFUGO_TOKEN_TTL: "43200"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: askme
      POSTGRES_USER: askme
      POSTGRES_PASSWORD: askme
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askme"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025"

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    command: centrifugo -c /centrifugo/config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "8001:8000"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  web:
    build: .
    env_file:
      - path: .env.docker
        required: false
    environment:
      <<: *app-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    env_file:
      - path: .env.docker
        required: false
    environment:
      <<: *app-env
      C_FORCE_ROOT: "true"
    entrypoint: ["celery"]
    command: ["-A", "application", "worker", "-l", "info"]
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celerybeat:
    build: .
    env_file:
      - path: .env.docker
        required: false
    environment:
      <<: *app-env
    entrypoint: ["celery"]
    command: ["-A", "application", "beat", "-l", "info"]
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
