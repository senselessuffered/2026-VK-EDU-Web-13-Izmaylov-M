worker_processes 1;
pid bench/nginx.pid;
error_log bench/nginx.error.log warn;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    access_log    bench/nginx.access.log;

    sendfile on;
    tcp_nopush on;

    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    proxy_cache_path bench/cache levels=1:2 keys_zone=app_cache:10m max_size=100m inactive=10m use_temp_path=off;

    upstream gunicorn_app { server 127.0.0.1:8000; }

    server {
        listen 8080;
        server_name localhost;

        location ^~ /uploads/ {
            alias media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* \.(js|css|jpe?g|png|gif|svg|ico|woff2?|ttf|html)$ {
            root core/static;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            proxy_pass http://gunicorn_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache app_cache;
            proxy_cache_valid 200 1m;
            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
