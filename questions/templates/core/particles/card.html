{% load static %}

<article class="question-card">
    <div class="card-body p-3">
        <div class="d-flex gap-3">
            <div class="question-rating text-center">
                <button class="btn btn-outline-light btn-sm" type="button" {% if not request.user.is_authenticated %}disabled title="Войдите, чтобы оценивать вопросы"{% endif %}>▲</button>
                <div class="fw-bold text-white my-2">{{ question.rating }}</div>
                <button class="btn btn-outline-light btn-sm" type="button" {% if not request.user.is_authenticated %}disabled title="Войдите, чтобы оценивать вопросы"{% endif %}>▼</button>
            </div>

            <img src="{% static 'img/avatar-default.jpg' %}" class="rounded-circle question-card-avatar" width="48" height="48" alt="">

            <div class="flex-grow-1 question-card-body">
                <h2 class="h5 mb-1">
                    <a href="{{ question.get_absolute_url }}" class="text-white text-decoration-none">
                        {{ question.title }}
                    </a>
                </h2>
                <p class="text-white-50 mb-2">{{ question.text }}</p>

                <div class="d-flex flex-wrap gap-2 align-items-center small text-white-50">
                    <span>{{ question.created_at|date:"d.m.Y H:i" }}</span>
                    <span>{{ question.answers_count }} ответов</span>
                    {% for tag in question.tags.all %}
                        <a href="{% url 'questions:tag' tag.name %}" class="badge text-bg-secondary text-decoration-none">
                            {{ tag.name }}
                        </a>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</article>
