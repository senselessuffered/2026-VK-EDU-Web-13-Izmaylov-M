{% load static %}

<div class="answer-item mb-3" id="answer-{{ answer.id }}">
    <div class="card-body p-4">
        <div class="d-flex gap-3">
            <div class="text-center js-vote-group"
                 data-vote-target="{{ answer.id }}"
                 data-vote-url="{% url 'questions:vote_answer' %}"
                 data-login-url="{% url 'core:login' %}?next={{ request.path }}">
                <button class="btn btn-outline-light btn-sm js-vote{% if answer.user_vote == 1 %} active{% endif %}"
                        type="button" data-value="1"
                        {% if not request.user.is_authenticated %}disabled title="Войдите, чтобы оценивать ответы"{% endif %}>▲</button>
                <div class="fw-bold my-2 text-white js-rating">{{ answer.rating }}</div>
                <button class="btn btn-outline-light btn-sm js-vote{% if answer.user_vote == -1 %} active{% endif %}"
                        type="button" data-value="-1"
                        {% if not request.user.is_authenticated %}disabled title="Войдите, чтобы оценивать ответы"{% endif %}>▼</button>
            </div>

            {% include 'particles/avatar.html' with profile_user=answer.author size=40 %}

            <div class="flex-grow-1">
                <div class="d-flex align-items-center gap-2 mb-2">
                    <span class="badge text-bg-success js-correct-badge{% if not answer.is_correct %} d-none{% endif %}">Принят</span>
                    {% if is_question_author %}
                        <button type="button"
                                class="btn btn-sm btn-outline-success js-correct{% if answer.is_correct %} active{% endif %}"
                                data-answer-id="{{ answer.id }}"
                                data-url="{% url 'questions:mark_correct' %}"
                                data-login-url="{% url 'core:login' %}?next={{ request.path }}">
                            {% if answer.is_correct %}Снять отметку{% else %}Отметить правильным{% endif %}
                        </button>
                    {% endif %}
                </div>

                <p class="text-white-50 mb-2">
                    Ответил {{ answer.created_at|date:"d.m.Y H:i" }}
                    <strong class="text-white">{{ answer.author.username }}</strong>
                </p>
                <p class="mb-0 text-white">{{ answer.text }}</p>
            </div>
        </div>
    </div>
</div>
