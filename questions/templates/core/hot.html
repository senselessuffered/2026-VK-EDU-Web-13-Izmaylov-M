{% extends 'layout/base.html' %}
{% load static %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 fw-bold mb-0">Горячие вопросы</h1>

    <a href="{% url 'questions:index' %}" class="text-decoration-none text-white-50">
        Вопросы
    </a>
</div>

{% for question in questions %}
    {% include 'particles/card.html' %}
{% empty %}
    <p class="text-white-50">Пока нет популярных вопросов.</p>
{% endfor %}

{% include 'particles/pagination.html' %}
{% endblock %}
