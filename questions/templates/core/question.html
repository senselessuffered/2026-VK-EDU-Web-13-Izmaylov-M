{% extends 'layout/base.html' %}
{% load static %}
{% block content %}
<div class="row">
    <div class="col-12 col-lg-8">
        <div class="card-dark mb-4">
            <div class="card-body p-4">
                <div class="d-flex gap-3">
                    <img title="Bender" src="{% static 'img/avatar-default.jpg' %}" class="rounded-circle" width="48" height="48" alt="avatar">

                    <div class="flex-grow-1">

                        <h1 class="h4 mb-2 text-white">{{ question.title }}</h1>

                        <p class="text-white-50 mb-2">
                            Спросил 2 часа назад by <strong class="text-white">Bender</strong>
                        </p>

                        <p class="text-white mb-3">
                            {{ question.text }}
                        </p>

                        <div class="d-flex flex-wrap gap-2">
                            <span class="badge text-bg-secondary">black-jack</span>
                            <span class="badge text-bg-secondary">moon</span>
                            <span class="badge text-bg-secondary">park</span>
                        </div>

                    </div>

                </div>

                </div>
            </div>

            <h2 class="h5 mb-3">Ответы</h2>

            {% include 'particles/answer.html' %}

            <div class="answer-form">
                <div class="card-header-dark">
                    <h3 class="h5 mb-0 text-white">Ваш ответ</h3>
                </div>

                <div class="card-body p-3">
                    <form>
                        <textarea class="form-control bg-dark text-white border-secondary mb-3"
                                rows="5"
                                required minlength="1" maxlength="1000"></textarea>

                        <button type="submit" class="btn btn-success w-100">
                            Ответить
                        </button>
                    </form>
                </div>
            </div>

        </div>

{% endblock %}
