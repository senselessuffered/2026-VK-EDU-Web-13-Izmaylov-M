{% extends 'layout/base.html' %}

{% block content %}
<div class="card bg-dark shadow-sm border-secondary">
    <div class="card-body p-4">
        <h1 class="h3 mb-4 text-white">Задать вопрос</h1>

        <form method="post">
            {% csrf_token %}
            {% for error in form.non_field_errors %}
                <div class="alert alert-danger py-2">{{ error }}</div>
            {% endfor %}

            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-white-50" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                        <div class="alert alert-danger py-2 mt-2">{{ error }}</div>
                    {% endfor %}
                </div>
            {% endfor %}

            <button type="submit" class="btn btn-success w-100">Опубликовать</button>
        </form>
    </div>
</div>
{% endblock %}
