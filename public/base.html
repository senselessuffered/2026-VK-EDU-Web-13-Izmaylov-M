<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AskPupkin{% endblock %}</title>
    <link rel="icon" type="image/png" href="static/img/favicon.png">
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>

<body class="bg-dark text-white d-flex flex-column min-vh-100">
<header class="bg-black border-bottom border-white-10 py-3">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-12 col-md-3 mb-2 mb-md-0">
                <a href="{% url 'index' %}" class="text-decoration-none text-white fs-4 fw-bold">AskPupkin</a>
            </div>
            <div class="col-12 col-md-5 mb-2 mb-md-0">
                <form>
                    <div class="input-group">
                        <input type="text" class="form-control" placeholder="Search questions...">
                        <button type="submit" class="btn btn-outline-light">Search</button>
                    </div>
                </form>
            </div>
            <div class="col-6 col-md-2 mb-2 mb-md-0">
                <a href="{% url 'ask' %}" class="btn btn-light text-dark w-100">ASK!</a>
            </div>
            <div class="col-6 col-md-2 text-end">
                <a href="{% url 'login' %}" class="btn btn-outline-light me-2">Log in</a>
                <a href="{% url 'signup' %}" class="btn btn-light text-dark">Sign up</a>
            </div>
        </div>
    </div>
</header>

<main class="container my-4 flex-grow-1">
    <div class="row">
        <div class="col-12 col-lg-8">
            {% block content %}
            {% endblock %}
        </div>
        <div class="col-12 col-lg-4 mt-4 mt-lg-0">
            <div class="card bg-dark border-white-10 mb-4">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">Popular Tags</h5>
                </div>
                <div class="card-body">
                    <div class="d-flex flex-wrap gap-2">
                        <a href="#" class="badge bg-white text-dark">python</a>
                        <a href="#" class="badge bg-white text-dark">django</a>
                        <a href="#" class="badge bg-white text-dark">javascript</a>
                        <a href="#" class="badge bg-white text-dark">html</a>
                        <a href="#" class="badge bg-white text-dark">css</a>
                    </div>
                </div>
            </div>
            <div class="card bg-dark border-white-10">
                <div class="card-header bg-secondary text-white"><h5 class="mb-0">Best Members</h5></div>
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <img src="static/img/avatar-default.png" class="user-avatar me-3" alt="avatar">
                        <div><div class="fw-semibold">Mr. Freeman</div><small class="text-muted">1245 points</small></div>
                    </div>
                    <div class="d-flex align-items-center mb-3">
                        <img src="static/img/avatar-default.png" class="user-avatar me-3" alt="avatar">
                        <div><div class="fw-semibold">Dr. House</div><small class="text-muted">987 points</small></div>
                    </div>
                    <div class="d-flex align-items-center">
                        <img src="static/img/avatar-default.png" class="user-avatar me-3" alt="avatar">
                        <div><div class="fw-semibold">Bender</div><small class="text-muted">756 points</small></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="bg-black border-top border-white-10 py-3 mt-auto">
    <div class="container text-center"><small class="text-muted">REL© 2026</small></div>
</footer>

<script src="static/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
